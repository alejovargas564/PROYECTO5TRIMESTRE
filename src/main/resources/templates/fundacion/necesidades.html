<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Necesidades - SAPIB</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5; /* Índigo: Confianza */
            --secondary: #14B8A6; /* Teal: Ayuda */
            --warm: #FFB703; /* Amarillo: Energía/Alerta */
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 px-8 py-3 flex justify-between items-center fixed top-0 w-full z-50 shadow-sm">
        <div class="flex items-center space-x-4">
            <div class="flex items-center">
                <img th:src="@{/img/s1.png}" alt="Logo SAPIB" class="h-12 w-auto object-contain">
            </div>
            
            <div class="flex items-center space-x-3">
                <span class="text-2xl font-black text-[#4F46E5] tracking-tight">SAPIB</span>
                <span class="text-gray-500 font-medium text-sm border-l border-gray-300 pl-3" th:text="${#authentication.name}">usuario@gmail.com</span>
            </div>
        </div>

        <nav class="flex items-center space-x-8 font-bold">
            <a th:href="@{/fundacion/dashboard}" class="text-gray-600 hover:text-[#4F46E5] transition">Inicio</a>
            
            <form th:action="@{/logout}" method="post" class="inline ml-4">
                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-lg text-xs uppercase tracking-widest transition shadow-md font-bold">Salir</button>
            </form>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto w-full px-6 pt-32 pb-12">
        
        <div th:if="${param.guardado}" class="bg-emerald-100 border border-emerald-300 text-emerald-700 p-4 rounded-xl mb-6 flex items-center shadow-sm">
            <i class="bi bi-check-circle-fill mr-3 text-xl"></i>
            <span class="font-bold">Publicación guardada con éxito.</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
                    <h2 class="text-2xl font-black text-gray-800 mb-6" 
                        th:text="${necesidad.id != null} ? '✏️ Editar' : '⭐ Nueva Publicación'"></h2>

                    <form th:action="@{/fundacion/necesidades/guardar}" th:object="${necesidad}" method="post" class="space-y-5">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" name="fundacionId" th:value="${fundacionId}"/> 

                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Título</label>
                            <input type="text" th:field="*{titulo}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-semibold">
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Categoría</label>
                            <select th:field="*{tipoNecesidad}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                                <option value="MATERIALES">Materiales</option>
                                <option value="TALLERES">Talleres / Clases</option>
                                <option value="FINANCIERO">Financiero</option>
                                <option value="OTRO">Otro</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Prioridad del Aporte</label>
                            <select th:field="*{prioridad}" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-black text-sm">
                                <option value="BAJA">🔵 BAJA (Informativa)</option>
                                <option value="MEDIA" selected>🟠 MEDIA (Importante)</option>
                                <option value="ALTA">🔴 ALTA (Urgente)</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Descripción</label>
                            <textarea th:field="*{descripcion}" rows="3" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium"></textarea>
                        </div>

                        <label class="flex items-center space-x-3 cursor-pointer group bg-slate-50 p-3 rounded-xl border border-dashed border-slate-300">
                            <input type="checkbox" th:field="*{estadoActivo}" class="h-5 w-5 text-indigo-600 rounded border-gray-300">
                            <span class="text-xs font-bold text-slate-500 uppercase">Visible en el sistema</span>
                        </label>

                        <button type="submit" class="w-full py-4 rounded-2xl font-black uppercase tracking-widest text-white shadow-lg transition-all transform active:scale-95"
                                th:classappend="${necesidad.id != null} ? 'bg-blue-600' : 'bg-indigo-600'">
                            <span th:text="${necesidad.id != null} ? 'Actualizar Cambios' : 'Publicar Ahora'"></span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                    <table class="min-w-full">
                        <thead class="bg-gray-50 border-b border-gray-100">
                            <tr class="text-[10px] font-black text-gray-400 uppercase tracking-widest">
                                <th class="p-6 text-left">Necesidad</th>
                                <th class="p-6 text-center">Prioridad</th>
                                <th class="p-6 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <tr th:each="n : ${necesidades}" class="hover:bg-slate-50 transition">
                                <td class="p-6">
                                    <div class="font-bold text-gray-900 text-lg" th:text="${n.titulo}"></div>
                                    <div class="text-[10px] text-indigo-400 font-bold uppercase tracking-wider" th:text="${n.tipoNecesidad}"></div>
                                </td>
                                
                                <td class="p-6 text-center">
                                    <span th:if="${n.prioridad == 'ALTA'}" class="px-3 py-1 bg-red-100 text-red-600 text-[10px] font-black rounded-full pulse-red flex items-center justify-center w-24 mx-auto">
                                        <i class="bi bi-fire mr-1"></i> ALTA
                                    </span>
                                    <span th:if="${n.prioridad == 'MEDIA'}" class="px-3 py-1 bg-orange-100 text-orange-600 text-[10px] font-black rounded-full flex items-center justify-center w-24 mx-auto">
                                        <i class="bi bi-exclamation-circle mr-1"></i> MEDIA
                                    </span>
                                    <span th:if="${n.prioridad == 'BAJA'}" class="px-3 py-1 bg-blue-100 text-blue-600 text-[10px] font-black rounded-full flex items-center justify-center w-24 mx-auto">
                                        <i class="bi bi-info-circle mr-1"></i> BAJA
                                    </span>
                                </td>

                                <td class="p-6 text-center space-x-2">
                                    <a th:href="@{'/fundacion/necesidades/editar/' + ${n.id}}" class="inline-flex p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-600 hover:text-white transition">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>
                                    <a th:href="@{'/fundacion/necesidades/eliminar/' + ${n.id}}" onclick="return confirm('¿Eliminar publicación?')" class="inline-flex p-2 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-600 hover:text-white transition">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
