<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Donaciones - SAPIB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root { 
            --primary: #4F46E5; 
            --secondary: #14B8A6; 
            --warm: #FFB703;
        }
        .bg-sapib-soft {
            background: radial-gradient(circle at top right, #EEF2FF, #F8FAFC);
        }
        .card-glow {
            box-shadow: 0 20px 50px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body class="bg-sapib-soft min-h-screen flex flex-col">

    <nav class="bg-white/95 shadow-sm backdrop-blur-md border-b fixed top-0 left-0 w-full z-20">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img th:src="@{/img/s1.png}" alt="Logo SAPIB" class="h-12 w-auto rounded-lg shadow-sm">
                <span class="text-xl font-bold text-[var(--primary)]">SAPIB</span>
                <span class="hidden md:block text-gray-400 text-sm border-l pl-3 ml-3">Aportes</span>
            </div>

            <ul class="flex space-x-6 font-medium text-gray-700 items-center">
                <li><a th:href="@{/voluntario/fundaciones}" class="hover:text-[var(--primary)] transition">Fundaciones</a></li>
                <li><a th:href="@{/voluntario/dashboard}" class="hover:text-[var(--primary)] transition text-sm px-4 py-2 bg-slate-100 rounded-full">Inicio</a></li>
            </ul>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center pt-24 pb-12 px-4">
        
        <div class="max-w-md w-full bg-white rounded-3xl overflow-hidden border border-slate-100 card-glow">
            
            <div class="relative bg-indigo-600 p-8 text-center overflow-hidden">
                <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
                <div class="absolute -bottom-10 -left-10 w-24 h-24 bg-indigo-400/20 rounded-full"></div>
                
                <div class="relative z-10">
                    <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-2xl shadow-xl mb-4 rotate-3">
                        <i class="bi bi-heart-fill text-indigo-600 text-4xl"></i>
                    </div>
                    <h1 class="text-white text-2xl font-black tracking-tight">Tu ayuda importa</h1>
                    <p class="text-indigo-100 text-sm mt-1">Donación para:</p>
                    <div class="mt-2 inline-block px-4 py-1 bg-indigo-500/30 rounded-full border border-white/20">
                        <span class="text-white font-bold" th:text="${fundacion.userName}">Fundación Esperanza</span>
                    </div>
                </div>
            </div>

            <div class="p-8 space-y-6">
                
                <div class="group">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Monto a donar (COP)</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-4 text-2xl font-bold text-slate-300">$</span>
                        <input type="number" id="monto" placeholder="Ej: 50.000" 
                               class="w-full pl-10 pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-xl font-bold text-indigo-600 focus:border-indigo-500 focus:bg-white outline-none transition-all placeholder:text-slate-300">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Correo para comprobante</label>
                    <div class="relative flex items-center">
                        <i class="bi bi-envelope absolute left-4 text-slate-400 text-lg"></i>
                        <input type="email" id="email" placeholder="tu@correo.com" 
                               class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl focus:border-indigo-500 focus:bg-white outline-none transition-all">
                    </div>
                </div>

                <div class="pt-2">
                    <button onclick="iniciarPago()" 
                            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-lg shadow-indigo-100 transition-all transform hover:-translate-y-1 active:scale-[0.95] flex items-center justify-center">
                        <i class="bi bi-shield-lock-fill mr-3 text-xl"></i>
                        Pagar de forma segura
                    </button>
                    <p class="text-[10px] text-center text-slate-400 mt-4 flex items-center justify-center">
                        <i class="bi bi-lock-fill mr-1"></i> Transacción cifrada y protegida por Wompi
                    </p>
                </div>
            </div>

            <div class="bg-slate-50/80 p-6 border-t border-slate-100">
                <div class="flex items-center justify-between">
                    <div class="flex space-x-3 grayscale opacity-60">
                        <img th:src="@{/img/pse.png}" alt="PSE" class="h-6">
                        <img th:src="@{/img/nequi.png}" alt="Nequi" class="h-6">
                        <img th:src="@{/img/bancolombia.png}" alt="Bancolombia" class="h-6">
                    </div>
                    <a th:href="@{/voluntario/fundaciones}" class="text-xs font-bold text-slate-400 hover:text-red-500 transition-colors uppercase tracking-tighter">
                        Cancelar
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script type="text/javascript" src="https://checkout.wompi.co/widget.js"></script>
    <script th:src="@{/js/donaciones.js}"></script>

</body>
</html>
