<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - SAPIB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #4F46E5; --secondary: #14B8A6; }
        .bg-sapib {
            background: linear-gradient(to bottom right, rgba(79, 70, 229, 0.85), rgba(20, 184, 166, 0.85)),
                        url('https://i.pinimg.com/736x/ea/29/a4/ea29a44d8bc999da54fcb789f39bc079.jpg') no-repeat center center fixed;
            background-size: cover;
        }
    </style>
</head>
<body class="bg-sapib min-h-screen flex justify-center items-center backdrop-blur-sm p-4">

<div class="w-full max-w-md bg-white/95 shadow-2xl rounded-xl p-8 border border-gray-200">
    <div class="text-center mb-4">
        <img src="/img/s1.png" class="w-24 h-auto mx-auto rounded-lg shadow-md border-2 border-primary" alt="Logo SAPIB">
    </div>

    <h2 class="text-center text-2xl font-bold text-primary mb-4">Crear Cuenta</h2>

    <div th:if="${error}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mb-4 rounded text-sm font-bold animate-pulse">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/registro}" th:object="${usuario}" method="post" class="space-y-4">
        <div>
            <label class="block text-gray-700 text-sm font-medium mb-1">Nombre de usuario:</label>
            <input type="text" th:field="*{userName}" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary outline-none" required>
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-medium mb-1">Contraseña:</label>
            <input type="password" th:field="*{password}" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary outline-none" required>
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-medium mb-1">Correo electrónico:</label>
            <input type="email" th:field="*{correoUsuario}" class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary outline-none" required>
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-medium mb-1">Teléfono (Solo números):</label>
            <input type="text" th:field="*{telefonoUsuario}" 
                   inputmode="numeric" pattern="[0-9]+" 
                   title="Debe ingresar solo números"
                   class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary outline-none" required>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-gray-700 text-sm font-medium mb-1">Documento:</label>
                <select th:field="*{tipoDocumento}" class="w-full px-3 py-2 rounded-lg border border-gray-300 bg-white outline-none" required>
                    <option value="CC">CC</option>
                    <option value="PA">PA</option>
                    <option value="NIT">NIT</option>
                </select>
            </div>
            <div>
                <label class="block text-gray-700 text-sm font-medium mb-1">Número:</label>
                <input type="text" th:field="*{numeroDocumento}" 
                       inputmode="numeric" pattern="[0-9]+" 
                       class="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary outline-none" required>
            </div>
        </div>

        <div>
            <label class="block text-gray-700 text-sm font-medium mb-1">Rol:</label>
            <select th:field="*{rol}" class="w-full px-3 py-2 rounded-lg border border-gray-300 bg-white outline-none" required>
                <option value="" disabled selected>Seleccione...</option>
                <option value="VOLUNTARIO">Voluntario</option>
                <option value="FUNDACION">Fundación</option>
            </select>
        </div>

        <input type="hidden" th:field="*{estadoUsuario}" value="true"/>

        <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg font-bold hover:bg-indigo-700 transition duration-200">
            Registrarse
        </button>
    </form>

    <div class="text-center mt-6">
        <a th:href="@{/login}" class="text-secondary font-medium hover:underline">Volver al Login</a>
    </div>
</div>

</body>
</html>
