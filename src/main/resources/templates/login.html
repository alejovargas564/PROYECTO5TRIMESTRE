<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - SAPIB</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --primary: #4F46E5;   /* Indigo */
            --secondary: #14B8A6; /* Teal */
        }

        /* Fondo combinado */
        .bg-sapib {
            background:
                linear-gradient(to bottom right,
                    rgba(79, 70, 229, 0.85),
                    rgba(20, 184, 166, 0.85)
                ),
                url('https://i.pinimg.com/736x/ea/29/a4/ea29a44d8bc999da54fcb789f39bc079.jpg')
                no-repeat center center fixed;
            background-size: cover;
        }

        /* Animación */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="bg-sapib min-h-screen flex justify-center items-center backdrop-blur-sm px-4">

<div class="w-full max-w-[400px] bg-white/95 shadow-2xl rounded-2xl p-8 border border-gray-100 animate-[fadeIn_.6s_ease-out]">

    <div class="text-center mb-6">
        <img th:src="@{/img/s1.png}" 
             class="h-20 mx-auto rounded-xl shadow-md border-2 border-indigo-600 object-contain p-1 bg-white"
             alt="Logo SAPIB">
    </div>

    <h2 class="text-center text-2xl font-black text-indigo-600 mb-8 uppercase tracking-tight">
        Bienvenido
    </h2>

    <div th:if="${param.error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 rounded mb-4 text-sm font-bold">
        Usuario o contraseña incorrectos.
    </div>

    <div th:if="${param.logout}" class="bg-emerald-50 border-l-4 border-emerald-500 text-emerald-700 p-3 rounded mb-4 text-sm font-bold">
        Sesión cerrada correctamente.
    </div>

    <div th:if="${param.registroExitoso}" class="bg-blue-50 border-l-4 border-blue-500 text-blue-700 p-3 rounded mb-4 text-sm font-bold">
        Registro exitoso. Ahora puedes entrar.
    </div>

    <form th:action="@{/login}" method="post" class="space-y-5">

        <div>
            <label class="block text-gray-700 mb-1 text-xs font-black uppercase tracking-widest">Correo o Documento:</label>
            <input
                type="text"
                name="username"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:outline-none transition-all placeholder:text-gray-300"
                placeholder="ejemplo@correo.com o ID"
                required autofocus>
        </div>

        <div>
            <label class="block text-gray-700 mb-1 text-xs font-black uppercase tracking-widest">Contraseña:</label>
            <input
                type="password"
                name="password"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-600 focus:outline-none transition-all"
                placeholder="••••••••"
                required>
        </div>

        <div class="pt-2">
            <button
                type="submit"
                class="bg-indigo-600 text-white py-3 rounded-xl font-black uppercase text-xs tracking-widest hover:bg-indigo-700 shadow-lg hover:shadow-indigo-200 transition-all w-full">
                Entrar al Sistema
            </button>
        </div>
    </form>

    <div class="text-center mt-8 pt-6 border-t border-gray-100 space-y-3">
        <a th:href="@{/registro}" class="text-indigo-600 text-sm font-bold hover:text-indigo-800 transition block">
            ¿No tienes cuenta? Regístrate aquí
        </a>

        <a th:href="@{/index}" class="text-gray-400 text-xs font-medium hover:text-indigo-600 transition block">
            <i class="bi bi-arrow-left"></i> Volver al inicio
        </a>
    </div>

</div>

</body>
</html>
