spring.application.name=AccesoUsuarios
server.port=8080

# Conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/sapib2?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# --- ESTRATEGIA ESTABLE ---
# 1. 'update' mantiene tus datos y solo crea lo que falte.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Mantener nombres exactos de Java a la DB (Crucial para tus entidades)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# --- DESACTIVAR CARGA AUTOMÁTICA ---
# Cambiamos a 'never' para que ya no ejecute el import.sql (porque el admin ya existe)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false