<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - SAPIB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { 
            --primary: #4F46E5; /* Índigo */
            --secondary: #14B8A6; /* Teal */
        }
        body {
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center pt-10 pb-10 px-4">

    <div class="max-w-xl w-full mb-6">
        <a th:href="@{/redirect-by-role}" 
           class="inline-flex items-center text-sm font-bold text-gray-500 hover:text-[var(--primary)] transition-colors group">
            <div class="bg-white p-2 rounded-lg shadow-sm border border-gray-200 mr-3 group-hover:border-[var(--primary)] transition-all">
                <i class="bi bi-arrow-left text-lg"></i>
            </div>
            VOLVER AL INICIO
        </a>
    </div>

    <div class="max-w-xl w-full bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-100">
        
        <div class="bg-[var(--primary)] p-8 text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full"></div>
            <div class="relative z-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 backdrop-blur-sm rounded-full mb-4 border-2 border-white/30">
                    <i class="bi bi-person-fill text-white text-4xl"></i>
                </div>
                <h2 class="text-white text-2xl font-black uppercase tracking-tight">Configuración de Perfil</h2>
                <p class="text-indigo-100 text-sm opacity-80" th:text="${usuario.correoUsuario}">correo@ejemplo.com</p>
            </div>
        </div>

        <div class="p-8">
            <div th:if="${param.perfilActualizado}" class="mb-6 bg-emerald-50 border border-emerald-200 text-emerald-700 p-4 rounded-xl font-medium flex items-center animate-pulse">
                <i class="bi bi-check-circle-fill mr-3 text-xl"></i>
                <span>¡Cambios guardados con éxito!</span>
            </div>

            <div th:if="${error}" class="mb-6 bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl font-medium flex items-center">
                <i class="bi bi-exclamation-triangle-fill mr-3 text-xl"></i>
                <span th:text="${error}">Error al actualizar</span>
            </div>

            <form th:action="@{/perfil/guardar}" th:object="${usuario}" method="post" class="space-y-6">
                
                <input type="hidden" th:field="*{id}"/>
                <input type="hidden" th:field="*{userName}"/>
                <input type="hidden" th:field="*{correoUsuario}"/>
                <input type="hidden" th:field="*{tipoDocumento}"/>
                <input type="hidden" th:field="*{numeroDocumento}"/>
                <input type="hidden" th:field="*{rol}"/>
                <input type="hidden" th:field="*{estadoUsuario}"/>
                <input type="hidden" th:field="*{createAt}"/>

                <div class="grid grid-cols-2 gap-4 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                    <div class="col-span-2 mb-2 flex items-center text-slate-400 text-[10px] font-black uppercase tracking-widest">
                        <i class="bi bi-lock-fill mr-2"></i> Información de Cuenta
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Nombre de Usuario</label>
                        <p class="text-sm font-bold text-slate-700" th:text="${usuario.userName}"></p>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Rol de Sistema</label>
                        <span class="inline-block px-2 py-0.5 bg-indigo-100 text-indigo-700 text-[10px] font-black rounded-md uppercase" th:text="${usuario.rol}">ROL</span>
                    </div>
                </div>

                <div class="space-y-5">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] border-b pb-2">Personalización</h3>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 flex items-center">
                            <i class="bi bi-telephone-fill mr-2 text-[var(--secondary)]"></i> Número de Contacto
                        </label>
                        <input type="text" th:field="*{telefonoUsuario}"
                               class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-[var(--primary)] outline-none transition-all font-medium text-slate-700"
                               placeholder="Tu número de teléfono" required>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 flex items-center">
                            <i class="bi bi-shield-lock-fill mr-2 text-rose-500"></i> Actualizar Contraseña
                        </label>
                        <input type="password" th:field="*{password}"
                               class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-500/10 focus:border-[var(--primary)] outline-none transition-all font-medium text-slate-700"
                               placeholder="••••••••">
                        <p class="text-[10px] text-slate-400 mt-2 italic">
                            <i class="bi bi-info-circle mr-1"></i> Deja este campo vacío si deseas conservar tu contraseña actual.
                        </p>
                    </div>
                </div>

                <button type="submit"
                        class="w-full bg-[var(--primary)] hover:bg-indigo-700 text-white py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-indigo-200 transition-all transform active:scale-[0.98] flex items-center justify-center">
                    <i class="bi bi-cloud-arrow-up-fill mr-3 text-lg"></i> Actualizar mi Perfil
                </button>
            </form>
        </div>
    </div>

    <p class="mt-8 text-slate-400 text-xs font-medium">SAPIB &copy; 2026 - Gestión de Ayudas Sociales</p>

</body>
</html>
